<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hungarian Voters Abroad – 2026</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([30,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// Convert single DMS string to decimal
function dmsToDecimal(dms) {
    let parts = dms.match(/(\d+)[°|º](\d+)'([\d.]+)"?([NSEW])/i);
    if (!parts) return NaN;
    let deg = parseFloat(parts[1]);
    let min = parseFloat(parts[2]);
    let sec = parseFloat(parts[3]);
    let dir = parts[4].toUpperCase();
    let dec = deg + min/60 + sec/3600;
    if (dir === "S" || dir === "W") dec *= -1;
    return dec;
}

// Robust coordinate parser
function parseCoordinates(coordStr) {
    if (!coordStr) return [NaN, NaN];

    if (coordStr.includes("°")) {
        // Match lat and lon DMS
        let matches = coordStr.match(/(\d+)[°|º]\d+'[\d.]+\"[NS]|[EW]/gi);
        if (!matches || matches.length < 2) return [NaN, NaN];
        let lat = dmsToDecimal(matches[0]);
        let lon = dmsToDecimal(matches[1]);
        return [lat, lon];
    } else {
        // Decimal format
        let cleaned = coordStr.replace(/[NSEW]/g,"").replace(/\s/g,"");
        let parts = cleaned.split(",");
        if (parts.length < 2) return [NaN, NaN];
        return [parseFloat(parts[0]), parseFloat(parts[1])];
    }
}

// Store markers for dynamic resizing
let markers = [];

fetch("data.json")
.then(response => response.json())
.then(data => {

    data.list.forEach(place => {
        let coords = place.kuvi_gps || place.gps;
        let [lat, lon] = parseCoordinates(coords);
        if (isNaN(lat) || isNaN(lon)) return;

        let accessibility = place.akadaly === "I" ? "Accessible" : "Not accessible";

        let popup = `
<b>${place.taz_nev_en}</b><br>
Registered voters: ${place.letszam}<br>
Accessibility: ${accessibility}<br>
Voting hours: ${place.idotartam}
`;

        let marker = L.circleMarker([lat, lon], {
            radius: Math.sqrt(place.letszam), // base radius, will scale
            color: "#2A81CB",
            fillColor: "#2A81CB",
            fillOpacity: 0.45,
            weight: 1
        }).addTo(map).bindPopup(popup);

        markers.push({marker: marker, voters: place.letszam});
    });

    // Dynamic scaling with zoom
    function updateMarkerSize() {
        let zoom = map.getZoom();
        markers.forEach(m => {
            let scale = Math.pow(zoom / 5, 1.2); // tweak for aesthetics
            let minRadius = 2; // prevent tiny circles disappearing
            let newRadius = Math.max(Math.sqrt(m.voters) * scale, minRadius);
            m.marker.setRadius(newRadius);
        });
    }

    map.on('zoomend', updateMarkerSize);
    updateMarkerSize();

    // --- Check number of cities displayed ---
    console.log("Number of city markers:", markers.length);

})
.catch(error => console.error("Failed to load data:", error));

</script>

</body>
</html>
