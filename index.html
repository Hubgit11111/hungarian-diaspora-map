<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hungarian Voters Abroad – 2026</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
#markerCount {
    position:absolute;
    top:10px;
    right:10px;
    padding:8px;
    background:white;
    z-index:999;
    font-family:Arial;
    border-radius:4px;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="map"></div>
<div id="markerCount">Loading markers...</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([30,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// Robust DMS/Decimal parser
function parseCoordinates(coordStr){
function parseCoordinates(coordString) {

    if (!coordString) return null;

    coordString = coordString.trim();

    // CASE 1: decimal with N/E/S/W (Abu Dhabi format)
    let match = coordString.match(/([0-9.]+)\s*([NS])\s*,?\s*([0-9.]+)\s*([EW])/i);
    if (match) {

        let lat = parseFloat(match[1]);
        let lon = parseFloat(match[3]);

        if (match[2].toUpperCase() === "S") lat = -lat;
        if (match[4].toUpperCase() === "W") lon = -lon;

        return [lat, lon];
    }

    // CASE 2: simple decimal
    if (coordString.includes(",")) {

        let parts = coordString.split(",");
        let lat = parseFloat(parts[0]);
        let lon = parseFloat(parts[1]);

        if (!isNaN(lat) && !isNaN(lon)) {
            return [lat, lon];
        }
    }

    // CASE 3: DMS format (Montreal style)
    let dmsMatch = coordString.match(/(\d+)°(\d+)[′']([\d.]+)[″"]?([NS])\s*(\d+)°(\d+)[′']([\d.]+)[″"]?([EW])/);

    if (dmsMatch) {

        let lat =
            parseFloat(dmsMatch[1]) +
            parseFloat(dmsMatch[2]) / 60 +
            parseFloat(dmsMatch[3]) / 3600;

        let lon =
            parseFloat(dmsMatch[5]) +
            parseFloat(dmsMatch[6]) / 60 +
            parseFloat(dmsMatch[7]) / 3600;

        if (dmsMatch[4] === "S") lat = -lat;
        if (dmsMatch[8] === "W") lon = -lon;

        return [lat, lon];
    }

    // CASE 4: degrees with symbols (Bern style)
    let degMatch = coordString.match(/([\d.]+)°\s*([NS])?,?\s*([\d.]+)°\s*([EW])/);

    if (degMatch) {

        let lat = parseFloat(degMatch[1]);
        let lon = parseFloat(degMatch[3]);

        if (degMatch[2] === "S") lat = -lat;
        if (degMatch[4] === "W") lon = -lon;

        return [lat, lon];
    }

    return null;
}

// Store markers
let markers=[];

// Load JSON data
fetch("data.json") // replace with your JSON path
.then(res => res.json())
.then(data => {
    data.list.forEach(place => {
        let coords = place.kuvi_gps || place.gps;
        let [lat, lon] = parseCoordinates(coords);

        if(isNaN(lat) || isNaN(lon)){
            console.warn("Skipped city:", place.taz_nev_en, "coords:", coords);
            return;
        }

        let accessibility = place.akadaly==='I' ? "Accessible" : "Not accessible";

        let popup = `
<b>${place.taz_nev_en}</b><br>
Registered voters: ${place.letszam}<br>
<a href="https://vtr.valasztas.hu/ogy2026/valasztopolgaroknak/kulkepviseletek-listaja?tab=kulkepviseletek-listaja" target="_blank">Venue address</a><br>
Accessibility: ${accessibility}<br>
Voting hours: ${place.idotartam}<br>
<a href="https://www.valasztas.hu/en/ugyintezes" target="_blank"><b>REGISTER TO VOTE NOW</b></a>
`;

        let marker = L.circleMarker([lat,lon],{
            radius: Math.sqrt(place.letszam),
            color: "#2A81CB",
            fillColor: "#2A81CB",
            fillOpacity:0.45,
            weight:1
        }).addTo(map).bindPopup(popup);

        markers.push({marker: marker, voters: place.letszam});
    });

    function updateMarkerSize(){
        let zoom = map.getZoom();
        markers.forEach(m => {
            let scale = Math.pow(zoom/5,1.2);
            let minRadius = 2;
            let newRadius = Math.max(Math.sqrt(m.voters)*scale, minRadius);
            m.marker.setRadius(newRadius);
        });
    }

    map.on('zoomend', updateMarkerSize);
    updateMarkerSize();

    document.getElementById('markerCount').innerText = "City markers displayed: " + markers.length;
})
.catch(error => {
    console.error("Failed to load data:", error);
    document.getElementById('markerCount').innerText = "Failed to load markers";
});
</script>

</body>
</html>
