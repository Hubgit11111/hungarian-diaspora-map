<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Hungarian Diaspora Voting Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
height:100vh;
width:100%;
}

.counterBox{
position:absolute;
top:10px;
right:10px;
background:white;
padding:8px 12px;
border-radius:6px;
box-shadow:0 0 6px rgba(0,0,0,0.25);
font-size:14px;
z-index:1000;
}

.popupLink{
color:#0057b7;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="counterBox">
City markers displayed: <span id="counter">0</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);


function parseCoordinates(coordString){

if(!coordString) return null;

coordString = coordString.trim();


// format: 24.488289N ,54.373057E
let m = coordString.match(/([0-9.]+)\s*([NS])\s*,?\s*([0-9.]+)\s*([EW])/i);

if(m){

let lat=parseFloat(m[1]);
let lon=parseFloat(m[3]);

if(m[2].toUpperCase()==="S") lat=-lat;
if(m[4].toUpperCase()==="W") lon=-lon;

return [lat,lon];

}


// format: decimal
if(coordString.includes(",")){

let p=coordString.split(",");

let lat=parseFloat(p[0]);
let lon=parseFloat(p[1]);

if(!isNaN(lat) && !isNaN(lon)){
return [lat,lon];
}

}


// DMS format
let d=coordString.match(/(\d+)°(\d+)[′']([\d.]+)[″"]?([NS])\s*(\d+)°(\d+)[′']([\d.]+)[″"]?([EW])/);

if(d){

let lat =
parseFloat(d[1]) +
parseFloat(d[2])/60 +
parseFloat(d[3])/3600;

let lon =
parseFloat(d[5]) +
parseFloat(d[6])/60 +
parseFloat(d[7])/3600;

if(d[4]==="S") lat=-lat;
if(d[8]==="W") lon=-lon;

return [lat,lon];

}


// degrees with symbol
let g=coordString.match(/([\d.]+)°\s*([NS])?,?\s*([\d.]+)°\s*([EW])/);

if(g){

let lat=parseFloat(g[1]);
let lon=parseFloat(g[3]);

if(g[2]==="S") lat=-lat;
if(g[4]==="W") lon=-lon;

return [lat,lon];

}

return null;

}



fetch("data.json")

.then(r=>r.json())

.then(data=>{

let count=0;

data.list.forEach(place=>{

let coords=parseCoordinates(place.kuvi_gps || place.gps);

if(!coords) return;

let voters = place.letszam;

let zoom = map.getZoom();

let radius = Math.sqrt(voters) * (zoom/2);


let accessibility = place.akadaly==="I" ? "Accessible" : "Not accessible";

let popup = `
<b>${place.taz_nev_en}</b><br><br>

<a class="popupLink" target="_blank"
href="https://vtr.valasztas.hu/ogy2026/valasztopolgaroknak/kulkepviseletek-listaja?tab=kulkepviseletek-listaja">
Venue address
</a>
<br><br>

Registered voters: ${voters}<br>
Accessibility: ${accessibility}<br>
Voting time: ${place.idotartam}<br><br>

<a class="popupLink" target="_blank"
href="https://www.valasztas.hu/en/ugyintezes">
REGISTER TO VOTE NOW
</a>
`;


let circle=L.circleMarker(coords,{
radius:radius,
color:"#c40000",
fillColor:"#e60000",
fillOpacity:0.7,
weight:1
}).addTo(map);

circle.bindPopup(popup);

count++;

});


document.getElementById("counter").innerText=count;


map.on("zoomend",function(){

map.eachLayer(function(layer){

if(layer instanceof L.CircleMarker){

let voters = layer.getPopup().getContent().match(/Registered voters: (\d+)/);

if(voters){

let v=parseInt(voters[1]);

let zoom=map.getZoom();

layer.setRadius(Math.sqrt(v)*(zoom/2));

}

}

});

});


});

</script>

</body>
</html>
