<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hungarian Voters Abroad – 2026</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([30,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

fetch("data.json")
.then(response => response.json())
.then(data => {

data.list.forEach(place => {

let cleaned = place.gps
.replace(/[NSEW]/g,"")
.replace(/\s/g,"");

let gps = cleaned.split(",");

let lat = parseFloat(gps[0]);
let lon = parseFloat(gps[1]);

let voters = place.letszam;

let radius = Math.sqrt(voters) * 2;

let accessibility = place.akadaly === "I" ? "Accessible" : "Not accessible";

let popup = `
<b>${place.taz_nev_en}</b><br>
Registered voters: ${voters}<br>
Accessibility: ${accessibility}<br>
Voting hours: ${place.idotartam}
`;

L.circleMarker([lat,lon],{
radius: radius,
color:"#2A81CB",
fillColor:"#2A81CB",
fillOpacity:0.6
})
.addTo(map)
.bindPopup(popup);

});

});

</script>

</body>
</html>
