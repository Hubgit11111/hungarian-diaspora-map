<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hungarian Voters Abroad – 2026</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
#markerCount {
    position:absolute;
    top:10px;
    right:10px;
    padding:8px;
    background:white;
    z-index:999;
    font-family:Arial;
    border-radius:4px;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="map"></div>
<div id="markerCount">Loading markers...</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([30,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// Convert DMS string (including fancy primes and decimal seconds) to decimal
function dmsToDecimal(dms) {
    if (!dms) return NaN;
    // Normalize primes and quotes
    dms = dms.replace(/[′’]/g, "'").replace(/[″“”]/g, '"');
    dms = dms.replace(/\u00A0/g,' ').trim(); // remove non-breaking spaces
    let parts = dms.match(/(\d+)[°|º](\d+)'([\d.]+)"?([NSEW])/i);
    if (!parts) return NaN;
    let deg = parseFloat(parts[1]);
    let min = parseFloat(parts[2]);
    let sec = parseFloat(parts[3]);
    let dir = parts[4].toUpperCase();
    let dec = deg + min/60 + sec/3600;
    if (dir === "S" || dir === "W") dec *= -1;
    return dec;
}

// Robust GPS parser for all known formats
function parseCoordinates(coordStr) {
    if (!coordStr) return [NaN, NaN];
    coordStr = coordStr.replace(/\u00A0/g,' ').trim();

    // DMS with degrees, minutes, decimal seconds, N/S/E/W
    let dmsMatches = coordStr.match(/(\d+)[°|º](\d+)'([\d.]+)["″]?([NSEW])/gi);
    if (dmsMatches && dmsMatches.length >= 2) {
        let lat = dmsToDecimal(dmsMatches[0]);
        let lon = dmsToDecimal(dmsMatches[1]);
        return [lat, lon];
    }

    // Decimal with optional degree symbol + N/S/E/W (Bern)
    let decimalMatch = coordStr.match(/(-?\d+\.?\d*)[°]?\s*([NS])?,?\s*(-?\d+\.?\d*)[°]?\s*([EW])?/i);
    if (decimalMatch) {
        let lat = parseFloat(decimalMatch[1]);
        let lon = parseFloat(decimalMatch[3]);
        let latDir = (decimalMatch[2] || '').toUpperCase();
        let lonDir = (decimalMatch[4] || '').toUpperCase();
        if (latDir==='S') lat*=-1;
        if (lonDir==='W') lon*=-1;
        return [lat, lon];
    }

    // Fallback: simple decimal with optional N/S/E/W
    let cleaned = coordStr.replace(/[NSEW]/gi,"").replace(/\s/g,"");
    let parts = cleaned.split(",");
    if (parts.length < 2) return [NaN, NaN];
    let lat = parseFloat(parts[0]);
    let lon = parseFloat(parts[1]);
    if (coordStr.toUpperCase().includes("S")) lat*=-1;
    if (coordStr.toUpperCase().includes("W")) lon*=-1;
    return [lat, lon];
}

// Store markers
let markers = [];

// Fetch JSON data (update path if needed)
fetch("data.json")
.then(response => response.json())
.then(data => {

    data.list.forEach(place => {
        let coords = place.kuvi_gps || place.gps;
        let [lat, lon] = parseCoordinates(coords);

        if (isNaN(lat) || isNaN(lon)) {
            console.warn("Skipped city:", place.taz_nev_en, "coords:", coords);
            return;
        }

        let accessibility = place.akadaly === "I" ? "Accessible" : "Not accessible";

        let popup = `
<b>${place.taz_nev_en}</b><br>
Registered voters: ${place.letszam}<br>
Accessibility: ${accessibility}<br>
Voting hours: ${place.idotartam}
`;

        let marker = L.circleMarker([lat, lon], {
            radius: Math.sqrt(place.letszam),
            color: "#2A81CB",
            fillColor: "#2A81CB",
            fillOpacity: 0.45,
            weight: 1
        }).addTo(map).bindPopup(popup);

        markers.push({marker: marker, voters: place.letszam});
    });

    // Scale bubbles dynamically with zoom
    function updateMarkerSize() {
        let zoom = map.getZoom();
        markers.forEach(m => {
            let scale = Math.pow(zoom / 5, 1.2);
            let minRadius = 2;
            let newRadius = Math.max(Math.sqrt(m.voters) * scale, minRadius);
            m.marker.setRadius(newRadius);
        });
    }

    map.on('zoomend', updateMarkerSize);
    updateMarkerSize();

    // Show marker count
    document.getElementById('markerCount').innerText = "City markers displayed: " + markers.length;

})
.catch(error => {
    console.error("Failed to load data:", error);
    document.getElementById('markerCount').innerText = "Failed to load markers";
});
</script>

</body>
</html>
