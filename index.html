<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hungarian Voters Abroad – 2026</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
#markerCount {
    position:absolute;
    top:10px;
    right:10px;
    padding:8px;
    background:white;
    z-index:999;
    font-family:Arial;
    border-radius:4px;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="map"></div>
<div id="markerCount">Loading markers...</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([30,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// Convert a single DMS string to decimal
function dmsToDecimal(dms) {
    if (!dms) return NaN;
    // Replace fancy primes with ASCII equivalents
    dms = dms.replace(/[′’]/g, "'").replace(/[″“”]/g, '"').trim();
    let parts = dms.match(/(\d+)[°|º](\d+)'([\d.]+)"?([NSEW])/i);
    if (!parts) return NaN;
    let deg = parseFloat(parts[1]);
    let min = parseFloat(parts[2]);
    let sec = parseFloat(parts[3]);
    let dir = parts[4].toUpperCase();
    let dec = deg + min/60 + sec/3600;
    if (dir === "S" || dir === "W") dec *= -1;
    return dec;
}

// Robust coordinate parser for decimal + DMS
function parseCoordinates(coordStr) {
    if (!coordStr) return [NaN, NaN];

    // Remove non-breaking spaces
    coordStr = coordStr.replace(/\u00A0/g, ' ').trim();

    // DMS with degree, prime, or second symbols
    if (coordStr.match(/[°′″]/)) {
        let matches = coordStr.match(/(\d+)[°|º](\d+)'([\d.]+)"?[NSEW]/gi);
        if (!matches || matches.length < 2) return [NaN, NaN];
        let lat = dmsToDecimal(matches[0]);
        let lon = dmsToDecimal(matches[1]);
        return [lat, lon];
    } else {
        // Decimal with optional N/S/E/W
        let cleaned = coordStr.replace(/[NSEW]/gi,"").replace(/\s/g,"");
        let parts = cleaned.split(",");
        if (parts.length < 2) return [NaN, NaN];
        let lat = parseFloat(parts[0]);
        let lon = parseFloat(parts[1]);
        // Apply N/S/E/W manually
        if (coordStr.toUpperCase().includes("S")) lat *= -1;
        if (coordStr.toUpperCase().includes("W")) lon *= -1;
        return [lat, lon];
    }
}

// Store markers for dynamic resizing
let markers = [];

fetch("data.json")
.then(response => response.json())
.then(data => {

    data.list.forEach(place => {
        let coords = place.kuvi_gps || place.gps;
        let [lat, lon] = parseCoordinates(coords);

        if (isNaN(lat) || isNaN(lon)) {
            console.warn("Skipped city:", place.taz_nev_en, "coords:", coords);
            return;
        }

        let accessibility = place.akadaly === "I" ? "Accessible" : "Not accessible";

        let popup = `
<b>${place.taz_nev_en}</b><br>
Registered voters: ${place.letszam}<br>
Accessibility: ${accessibility}<br>
Voting hours: ${place.idotartam}
`;

        let marker = L.circleMarker([lat, lon], {
            radius: Math.sqrt(place.letszam), // base radius
            color: "#2A81CB",
            fillColor: "#2A81CB",
            fillOpacity: 0.45,
            weight: 1
        }).addTo(map).bindPopup(popup);

        markers.push({marker: marker, voters: place.letszam});
    });

    // Dynamic scaling with zoom
    function updateMarkerSize() {
        let zoom = map.getZoom();
        markers.forEach(m => {
            let scale = Math.pow(zoom / 5, 1.2);
            let minRadius = 2;
            let newRadius = Math.max(Math.sqrt(m.voters) * scale, minRadius);
            m.marker.setRadius(newRadius);
        });
    }

    map.on('zoomend', updateMarkerSize);
    updateMarkerSize();

    // Display number of markers
    document.getElementById('markerCount').innerText = "City markers displayed: " + markers.length;

})
.catch(error => {
    console.error("Failed to load data:", error);
    document.getElementById('markerCount').innerText = "Failed to load markers";
});
</script>

</body>
</html>
