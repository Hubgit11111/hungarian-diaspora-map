<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hungarian Voters Abroad – 2026</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
#markerCount {
    position:absolute;
    top:10px;
    right:10px;
    padding:8px;
    background:white;
    z-index:999;
    font-family:Arial;
    border-radius:4px;
    box-shadow:0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="map"></div>
<div id="markerCount">Loading markers...</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([30,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// Robust DMS/Decimal parser
function parseCoordinates(coordStr){
    if(!coordStr) return [NaN, NaN];
    coordStr = coordStr.replace(/[′’]/g,"'").replace(/[″“”]/g,'"').replace(/\u00A0/g,' ').trim();

    const dmsMatches = coordStr.match(/(\d+)[°º](\d+)'([\d.]+)["″]?([NSEW])/gi);
    if(dmsMatches && dmsMatches.length >= 2){
        const dmsToDec = dms => {
            let m = dms.match(/(\d+)[°º](\d+)'([\d.]+)"?([NSEW])/i);
            if(!m) return NaN;
            let deg = parseFloat(m[1]);
            let min = parseFloat(m[2]);
            let sec = parseFloat(m[3]);
            let dir = m[4].toUpperCase();
            let dec = deg + min/60 + sec/3600;
            if(dir==='S'||dir==='W') dec*=-1;
            return dec;
        };
        let lat = dmsToDec(dmsMatches[0]);
        let lon = dmsToDec(dmsMatches[1]);
        return [lat, lon];
    }

    let decimalMatch = coordStr.match(/(-?\d+\.?\d*)[°]?\s*([NS])?,?\s*(-?\d+\.?\d*)[°]?\s*([EW])?/i);
    if(decimalMatch){
        let lat = parseFloat(decimalMatch[1]);
        let lon = parseFloat(decimalMatch[3]);
        let latDir = (decimalMatch[2]||'').toUpperCase();
        let lonDir = (decimalMatch[4]||'').toUpperCase();
        if(latDir==='S') lat*=-1;
        if(lonDir==='W') lon*=-1;
        return [lat, lon];
    }

    let cleaned = coordStr.replace(/[NSEW]/gi,"").replace(/\s+/g,",");
    let parts = cleaned.split(",");
    if(parts.length < 2) return [NaN, NaN];
    let lat = parseFloat(parts[0]);
    let lon = parseFloat(parts[1]);
    if(coordStr.toUpperCase().includes("S")) lat*=-1;
    if(coordStr.toUpperCase().includes("W")) lon*=-1;
    return [lat, lon];
}

// Store markers
let markers=[];

// Load JSON data
fetch("data.json") // replace with your JSON path
.then(res => res.json())
.then(data => {
    data.list.forEach(place => {
        let coords = place.kuvi_gps || place.gps;
        let [lat, lon] = parseCoordinates(coords);

        if(isNaN(lat) || isNaN(lon)){
            console.warn("Skipped city:", place.taz_nev_en, "coords:", coords);
            return;
        }

        let accessibility = place.akadaly==='I' ? "Accessible" : "Not accessible";

        let popup = `
<b>${place.taz_nev_en}</b><br>
Registered voters: ${place.letszam}<br>
<a href="https://vtr.valasztas.hu/ogy2026/valasztopolgaroknak/kulkepviseletek-listaja?tab=kulkepviseletek-listaja" target="_blank">Venue address</a><br>
Accessibility: ${accessibility}<br>
Voting hours: ${place.idotartam}<br>
<a href="https://magyarorszag.hu/szuf_ugyleiras?id=23c2f24f-86e9-48a3-8768-faa3ad6638bb&_n=kulkepviseleti_nevjegyzekbe_vetel_az_idokozi_orszaggyulesi_valasztason" target="_blank"><b>REGISTER TO VOTE NOW</b></a>
`;

        let marker = L.circleMarker([lat,lon],{
            radius: Math.sqrt(place.letszam),
            color: "#2A81CB",
            fillColor: "#2A81CB",
            fillOpacity:0.45,
            weight:1
        }).addTo(map).bindPopup(popup);

        markers.push({marker: marker, voters: place.letszam});
    });

    function updateMarkerSize(){
        let zoom = map.getZoom();
        markers.forEach(m => {
            let scale = Math.pow(zoom/5,1.2);
            let minRadius = 2;
            let newRadius = Math.max(Math.sqrt(m.voters)*scale, minRadius);
            m.marker.setRadius(newRadius);
        });
    }

    map.on('zoomend', updateMarkerSize);
    updateMarkerSize();

    document.getElementById('markerCount').innerText = "City markers displayed: " + markers.length;
})
.catch(error => {
    console.error("Failed to load data:", error);
    document.getElementById('markerCount').innerText = "Failed to load markers";
});
</script>

</body>
</html>
