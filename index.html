<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Hungarian Voters Abroad – 2026</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#map { height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([30,10],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// Load local JSON data
fetch("data.json")
.then(response => response.json())
.then(data => {

    data.list.forEach(place => {

        // Use reliable coordinates
        let coords = place.kuvi_gps || place.gps;

        // Clean the string: remove N/S/E/W and spaces
        let cleaned = coords.replace(/[NSEW]/g,"").replace(/\s/g,"");

        // Split into latitude and longitude
        let parts = cleaned.split(",");

        let lat = parseFloat(parts[0]);
        let lon = parseFloat(parts[1]);

        // Skip invalid coordinates
        if (isNaN(lat) || isNaN(lon)) return;

        // Compute circle radius (scaled)
        let radius = Math.sqrt(place.letszam) * 1.2;

        // Accessibility text
        let accessibility = place.akadaly === "I" ? "Accessible" : "Not accessible";

        // Popup content
        let popup = `
<b>${place.taz_nev_en}</b><br>
Registered voters: ${place.letszam}<br>
Accessibility: ${accessibility}<br>
Voting hours: ${place.idotartam}
`;

        // Draw circle on map
        L.circleMarker([lat, lon], {
            radius: radius,
            color: "#2A81CB",
            fillColor: "#2A81CB",
            fillOpacity: 0.45,
            weight: 1
        }).addTo(map).bindPopup(popup);

    });

})
.catch(error => console.error("Failed to load data:", error));

</script>

</body>
</html>
