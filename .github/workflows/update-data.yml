name: Auto Update Map Data

on:
  schedule:
    - cron: '0 2 * * *'   # runs daily at 02:00 UTC
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download latest JSON
        run: |
          echo "Downloading latest data..."
          curl -f -s -o new_data.json "https://vtr.valasztas.hu/ogy2026/data/03091300/ver/Kulkepviselet.json" || {
            echo "Download failed."
            exit 1
          }

      - name: Validate JSON
        run: |
          echo "Checking JSON validity..."
          jq empty new_data.json || {
            echo "Invalid JSON detected."
            exit 1
          }

      - name: Compare with existing data
        id: compare
        run: |
          if cmp -s new_data.json data.json; then
            echo "No changes detected."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Data changed."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Replace old data
        if: steps.compare.outputs.changed == 'true'
        run: |
          mv new_data.json data.json

      - name: Commit and push update
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automatic update of voter data"
          git push
