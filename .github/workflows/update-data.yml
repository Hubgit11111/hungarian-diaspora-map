name: Auto Update Map Data

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download latest JSON
        run: |
          echo "Getting latest dataset version..."

          curl -s https://vtr.valasztas.hu/ogy2026/data/config.json -o config.json

          VERSION=$(jq -r '.ver' config.json)

          echo "Latest dataset version: $VERSION"

          DATA_URL="https://vtr.valasztas.hu/ogy2026/data/$VERSION/ver/Kulkepviselet.json"

          echo "Downloading data from $DATA_URL"

          curl -f -s -o new_data.json "$DATA_URL"

      - name: Validate JSON
        run: |
          echo "Validating JSON..."
          jq empty new_data.json

      - name: Compare with existing data
        id: compare
        run: |
          if cmp -s new_data.json data.json; then
            echo "No changes detected"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Data changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Replace old data
        if: steps.compare.outputs.changed == 'true'
        run: mv new_data.json data.json

      - name: Commit and push update
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automatic update of voter data"
          git pull --rebase
          git push
